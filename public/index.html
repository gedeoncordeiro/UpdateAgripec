<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AgroGestão</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Lora:wght@400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style id="leaflet-fallback-css" media="none">
    .leaflet-container{width:100%;height:100%;background:#e8e8e8;outline:0;overflow:hidden;touch-action:none;position:relative;z-index:0}
    .leaflet-pane{position:absolute;left:0;top:0;bottom:0;right:0;z-index:1}
    .leaflet-top,.leaflet-bottom{position:absolute;z-index:1000;pointer-events:none}
    .leaflet-top{top:0}.leaflet-bottom{bottom:0}
    .leaflet-left{left:0}.leaflet-right{right:0}
    .leaflet-control{pointer-events:auto;float:left;clear:both}
    .leaflet-control-zoom{display:flex;gap:2px;margin:10px}
    .leaflet-control-zoom a{width:30px;height:30px;display:flex;align-items:center;justify-content:center;background:#fff;border-radius:4px;box-shadow:0 1px 5px rgba(0,0,0,.2);color:#333;font-size:18px;font-weight:700;text-decoration:none;cursor:pointer}
    .leaflet-control-attribution{padding:0 8px;background:rgba(255,255,255,.7);font-size:10px;color:#333;line-height:2;margin:0}
    .leaflet-popup{position:absolute;text-align:center;margin-bottom:20px}
    .leaflet-popup-content-wrapper{border-radius:12px;padding:1px;text-align:left}
    .leaflet-popup-content{margin:13px 19px;line-height:1.4;font-size:13px;font-family:sans-serif}
    .leaflet-popup-tip{width:17px;height:17px;padding:1px;transform:rotate(45deg)}
    .leaflet-popup-close-button{position:absolute;top:0;right:0;padding:4px 6px 0 0;border:none;width:24px;height:24px;font:16px/24px Tahoma;color:#757575;text-decoration:none;background:transparent;cursor:pointer}
    .leaflet-marker-icon{display:block}
  </style>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div id="page-login" class="page-full">
  <div class="login-wrap">
    <div class="login-brand">
      <div class="login-brand-mark">
        <img src="Logo.png" alt="AgroGestão" class="login-logo-img" onerror="this.style.display='none';document.getElementById('login-brand-icon-fallback').style.display='inline-flex'"/>
        <span class="icon icon-3xl" id="login-brand-icon-fallback" style="display:none"></span>
      </div>
      <h1>Agro<span>Gestão</span></h1>
      <p>Sistema de Gestão Rural</p>
    </div>
    <div class="login-box">
      <h2>Acesse sua conta</h2>
      <div id="login-erro" class="alert alert-erro" style="display:none"></div>
      <div class="form-group" style="margin-bottom:14px">
        <label>E-mail</label>
        <input id="login-email" type="email" placeholder="seu@email.com" autocomplete="off" value="admin@agrogestao.com"/>
      </div>
      <div class="form-group" style="margin-bottom:20px">
        <label>Senha</label>
        <input id="login-senha" type="password" placeholder="••••••••" autocomplete="off" value="admin123"/>
      </div>
      <button class="btn btn-primary btn-block btn-lg" onclick="fazerLogin()">
        Entrar <span class="icon icon-sm" id="btn-enter-icon"></span>
      </button>
      <div class="login-demo">
        <strong>Demonstração:</strong><br/>
        Admin: admin@agrogestao.com / admin123<br/>
        Operador: operador@agrogestao.com / op123456
      </div>
    </div>
  </div>
</div>

<!-- ══ APP ══ -->
<div id="page-app" class="app" style="display:none">

      </div>
      <div class="sidebar-logo-text">
        <div class="logo-name">AgroGestão</div>
        <div class="logo-sub">Sistema Rural</div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-label">Principal</div>

        <span class="icon nav-icon" id="nav-icon-dashboard"></span> Painel
      </button>
      <button class="nav-item" data-section="clientes" onclick="navegarPara('clientes',this)">

      </button>
      <button class="nav-item" data-section="imoveis" onclick="navegarPara('imoveis',this)">

      </button>
      <button class="nav-item" data-section="semoventes" onclick="navegarPara('semoventes',this)">
        <span class="icon nav-icon" id="nav-icon-semoventes"></span> Semoventes
      </button>

      <div class="nav-divider"></div>
      <div class="nav-section-label">Técnico</div>
      <button class="nav-item" data-section="projeto" onclick="navegarPara('projeto',this)">

      </button>
      <button class="nav-item" data-section="apascentamento" onclick="navegarPara('apascentamento',this)">
        <span class="icon nav-icon" id="nav-icon-apascentamento"></span> Apascentamento
      </button>
      <button class="nav-item" data-section="relatorios" onclick="navegarPara('relatorios',this)">
        <span class="icon nav-icon" id="nav-icon-relatorios"></span> Relatórios
      </button>
      <button class="nav-item" data-section="mapas" onclick="navegarPara('mapas',this)">
        <span class="icon nav-icon" id="nav-icon-mapas"></span> Mapas
      </button>

      <div class="nav-divider"></div>
      <div class="nav-section-label">Gestão</div>
      <button class="nav-item" data-section="financeiro" onclick="navegarPara('financeiro',this)">
        <span class="icon nav-icon" id="nav-icon-financeiro"></span> Financeiro
      </button>
      <button class="nav-item" data-section="agenda" onclick="navegarPara('agenda',this)">
        <span class="icon nav-icon" id="nav-icon-agenda"></span> Agenda

      <button class="nav-item" data-section="orcamentos" onclick="navegarPara('orcamentos',this)">

      </button>

      <div class="nav-divider"></div>
      <div class="nav-section-label">Sistema</div>
      <button class="nav-item" data-section="links" onclick="navegarPara('links',this)">
        <span class="icon nav-icon" id="nav-icon-links"></span> Links Úteis
      </button>
      <button class="nav-item" data-section="backup" onclick="navegarPara('backup',this)">

      </button>
      <button class="nav-item" data-section="update" onclick="navegarPara('update',this)">
        <span class="icon nav-icon" id="nav-icon-update"></span> Atualização
      </button>
      <button class="nav-item" id="nav-admin" data-section="admin" onclick="navegarPara('admin',this)" style="display:none">
        <span class="icon nav-icon" id="nav-icon-admin"></span> Usuários
      </button>
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="user-avatar" id="user-avatar">AD</div>
        <div class="user-info">
          <div class="user-name" id="user-nome">—</div>
          <div class="user-role" id="user-perfil">—</div>
        </div>
      </div>
      <div class="sidebar-actions">
        <button class="sidebar-action-btn theme-toggle" onclick="alternarTema()" id="btn-tema" title="Alternar tema">
          <span class="icon" id="tema-icon"></span>
        </button>
        <button class="sidebar-action-btn" onclick="sair()" title="Sair">
          <span class="icon icon-sm" id="sidebar-logout-icon"></span> Sair
        </button>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main-content">
    <div id="section-dashboard"      class="section active"></div>
    <div id="section-clientes"       class="section"></div>
    <div id="section-imoveis"        class="section"></div>
    <div id="section-semoventes"     class="section"></div>
    <div id="section-projeto"        class="section"></div>
    <div id="section-apascentamento" class="section"></div>
    <div id="section-relatorios"     class="section"></div>
    <div id="section-mapas"          class="section"></div>
    <div id="section-financeiro"     class="section"></div>
    <div id="section-agenda"         class="section"></div>
    <div id="section-orcamentos"     class="section"></div>
    <div id="section-backup"         class="section"></div>
    <div id="section-update"         class="section"></div>
    <div id="section-admin"          class="section"></div>
    <div id="section-links"          class="section"></div>
  </main>
</div>

<!-- ══ MODAL ══ -->
<div id="modal-overlay" class="modal-overlay">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3 id="modal-titulo">Título</h3>
      <button class="modal-close" onclick="fecharModal()">
        <span class="icon icon-sm" id="modal-close-icon"></span>
      </button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<div id="toast-container"></div>

<script src="js/mapas.js"></script>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// Fallback: se Leaflet não carregar do CDN, ativa CSS fallback e tenta CDN alternativo
(function(){
  if (typeof L !== 'undefined') return;
  // Ativa o CSS fallback
  var fb = document.getElementById('leaflet-fallback-css');
  if (fb) fb.media = 'all';

  // Tenta carregar de CDN alternativo
  var s = document.createElement('script');
  s.src = 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js';
  s.onload = function(){
    // Carrega CSS do CDN alternativo
    var lc = document.createElement('link');
    lc.rel = 'stylesheet';
    lc.href = 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css';
    document.head.appendChild(lc);
  };
  document.body.appendChild(s);
})();
</script>

<!-- Injeta ícones SVG nas posições estáticas do HTML -->
<script>
document.addEventListener('DOMContentLoaded', () => {
  const set = (id, icon) => {
    const el = document.getElementById(id);
    if (el) el.innerHTML = ICONS[icon] || '';
  };

  set('nav-icon-update', 'cloud');
  set('login-brand-icon-fallback',    'wheat');
  set('btn-enter-icon',      'arrow_right');
  set('sidebar-logo-icon-fallback',   'wheat');
  set('nav-icon-dashboard',  'dashboard');
  set('nav-icon-clientes',   'clientes');
  set('nav-icon-imoveis',    'imoveis');
  set('nav-icon-semoventes', 'cow');
  set('nav-icon-projeto',    'projeto');
  set('nav-icon-apascentamento', 'cow');
  set('nav-icon-relatorios', 'relatorios');
  set('nav-icon-mapas',      'mapas');
  set('nav-icon-financeiro', 'money');
  set('nav-icon-agenda',     'calendar');
  set('nav-icon-orcamentos',  'money');
  set('nav-icon-backup',     'backup');
  set('nav-icon-links',      'link');
  set('nav-icon-admin',      'settings');
  set('tema-icon',           'moon');
  set('sidebar-logout-icon', 'logout');
  set('modal-close-icon',    'x');
});
</script>
</body>
</html>
